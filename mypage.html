<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 | 고시생 필수템 리뷰</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f6;--bg-soft:#f4f1eb;--text:#2c2c2e;--sub:#636366;--border:#e5e5e7;--accent:#1c1c1e}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.topbar{position:sticky;top:0;z-index:50;background:rgba(250,249,246,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.topbar-inner{max-width:980px;margin:0 auto;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}.topbar-brand{font-size:14px;font-weight:700;color:var(--text);text-decoration:none}.topbar-nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.topbar-link,.topbar-btn{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 14px;border-radius:999px;font-size:14px;font-weight:600;text-decoration:none;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer}.topbar-btn.primary,.topbar-link.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.topbar-user{font-size:13px;color:var(--sub);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrap{max-width:980px;margin:0 auto;padding:48px 24px 80px}.hero{margin-bottom:28px}.eyebrow{font-size:13px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}.title{font-family:'Noto Serif KR',serif;font-size:clamp(30px,5vw,46px);font-weight:900;line-height:1.3;margin-bottom:10px}.desc{color:var(--sub);font-size:16px;max-width:680px}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:24px}.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:0 20px 40px rgba(0,0,0,.04)}.card h2{font-family:'Noto Serif KR',serif;font-size:24px;margin-bottom:16px}.info-list{display:grid;gap:14px}.info-item{padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--bg)}.label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}.value{font-size:16px;font-weight:600;word-break:break-all}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;text-decoration:none}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.aside{background:var(--bg-soft);border:1px solid var(--border);border-radius:16px;padding:24px}.aside h3{font-size:18px;margin-bottom:12px}.aside p{color:var(--sub)}
@media (max-width:780px){.grid{grid-template-columns:1fr}.wrap{padding-top:32px}}
</style>
</head>
<body data-require-auth="true">
<div class="topbar">
  <div class="topbar-inner">
    <a class="topbar-brand" href="index.html">고시생 필수템 리뷰</a>
    <div class="topbar-nav">
      <span class="topbar-user" id="auth-user-email" hidden></span>
      <a class="topbar-link" href="index.html">홈</a>
      <a class="topbar-link primary" href="mypage.html">마이페이지</a>
      <a class="topbar-link" href="login.html" id="login-link">로그인</a>
      <button class="topbar-btn primary" type="button" id="logout-button" hidden>로그아웃</button>
    </div>
  </div>
</div>
<div class="wrap">
  <div class="hero">
    <p class="eyebrow">My Page</p>
    <h1 class="title">로그인한 사용자만<br>접근 가능한 페이지입니다</h1>
    <p class="desc">현재 로그인 계정 정보를 표시합니다. 나중에 주문 내역, 저장한 글, 프로필 편집 같은 기능을 여기에 확장할 수 있습니다.</p>
  </div>
  <div class="grid">
    <section class="card">
      <h2>계정 정보</h2>
      <div class="info-list">
        <div class="info-item"><span class="label">이메일</span><span class="value" id="mypage-email">불러오는 중...</span></div>
        <div class="info-item"><span class="label">사용자 ID</span><span class="value" id="mypage-user-id">불러오는 중...</span></div>
        <div class="info-item"><span class="label">마지막 로그인</span><span class="value" id="mypage-last-signin">확인 중...</span></div>
      </div>
      <div class="actions">
        <a class="btn" href="index.html">홈으로</a>
        <button class="btn primary" type="button" id="logout-button-secondary">로그아웃</button>
      </div>
    </section>
    <aside class="aside">
      <h3>다음에 붙이기 좋은 기능</h3>
      <p>프로필 수정, 구매 내역, 문의 내역, 저장한 상품, 댓글 관리 같은 항목을 이 페이지에 이어서 붙이면 됩니다.</p>
    </aside>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
</body>
</html>
